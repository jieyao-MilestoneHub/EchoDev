name: Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run (no real publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC → npm provenance / trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC → short-lived publish token) requires
      # npm >= 11.5.1. Node 22 LTS ships with npm 10.x, so we upgrade
      # explicitly. Without this the publish step 404s even when OIDC
      # provenance signing succeeds.
      #
      # Pinned (not `@latest`): on 2026-04-26 the v0.3.0 publish dry-run
      # failed because npm 10.x self-upgrading to npm@latest (12.x) left a
      # half-rewritten global node_modules and threw
      # `Cannot find module 'promise-retry'` from @npmcli/arborist. 11.5.1
      # is the documented OIDC minimum and a known-good landing point.
      # Bump deliberately when there's a reason; do not float to @latest.
      - run: npm install -g npm@11.5.1
      - run: node --version && npm --version

      - run: npm ci

      - run: npm run build

      - name: Verify tag matches packages/cli version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/cli
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Auth is OIDC trusted publishing (no long-lived token). The package must
      # be configured as a trusted publisher on npmjs.com:
      #   Package → Settings → Publishing access → Add trusted publisher →
      #   GitHub Actions / jieyao-MilestoneHub / EchoDev / publish.yml
      # Once that is in place, npm publish below uses the job's OIDC token to
      # mint a short-lived publish token — it does not need NPM_TOKEN.
      - name: Publish to npm (${{ inputs.dry-run && 'dry-run' || 'real' }})
        working-directory: packages/cli
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
